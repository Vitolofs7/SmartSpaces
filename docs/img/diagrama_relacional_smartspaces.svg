<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 750" width="1400" height="750">
  <defs>
    <style>
      .table-box { fill: #ffffff; stroke: #333; stroke-width: 2; }
      .table-header { fill: #2c3e50; }
      .pk-row { fill: #fff9e6; stroke: #ddd; stroke-width: 1; }
      .fk-row { fill: #ffe6e6; stroke: #ddd; stroke-width: 1; }
      .normal-row { fill: #f8f8f8; stroke: #ddd; stroke-width: 1; }
      .text-white { fill: white; font-weight: bold; font-size: 14px; }
      .text-black { fill: black; font-size: 12px; font-family: 'Monaco', monospace; }
      .rel-line { stroke: #3498db; stroke-width: 2.5; fill: none; }
      .rel-label { fill: #2c3e50; font-size: 11px; font-weight: bold; background: white; }
      .legend-label { fill: black; font-size: 12px; }
    </style>
    <marker id="arrow-end" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3498db"/>
    </marker>
  </defs>

  <text x="700" y="35" font-size="22" font-weight="bold" text-anchor="middle" fill="#2c3e50">
    SmartSpaces - Diagrama Relacional SQLite
  </text>

  <!-- USERS -->
  <rect x="40" y="80" width="310" height="32" class="table-header"/>
  <text x="195" y="102" text-anchor="middle" class="text-white">users</text>
  <rect x="40" y="112" width="310" height="28" class="pk-row"/>
  <text x="50" y="131" class="text-black">* user_id TEXT PRIMARY KEY</text>
  <rect x="40" y="140" width="310" height="28" class="normal-row"/>
  <text x="50" y="159" class="text-black">name TEXT NOT NULL</text>
  <rect x="40" y="168" width="310" height="28" class="normal-row"/>
  <text x="50" y="187" class="text-black">surname1 TEXT NOT NULL</text>
  <rect x="40" y="196" width="310" height="28" class="normal-row"/>
  <text x="50" y="215" class="text-black">surname2 TEXT NOT NULL</text>
  <rect x="40" y="224" width="310" height="28" class="normal-row"/>
  <text x="50" y="243" class="text-black">active INTEGER NOT NULL</text>

  <!-- SPACES -->
  <rect x="1040" y="80" width="320" height="32" class="table-header"/>
  <text x="1200" y="102" text-anchor="middle" class="text-white">spaces</text>
  <rect x="1040" y="112" width="320" height="28" class="pk-row"/>
  <text x="1050" y="131" class="text-black">* space_id TEXT PRIMARY KEY</text>
  <rect x="1040" y="140" width="320" height="28" class="normal-row"/>
  <text x="1050" y="159" class="text-black">space_name TEXT NOT NULL</text>
  <rect x="1040" y="168" width="320" height="28" class="normal-row"/>
  <text x="1050" y="187" class="text-black">capacity INTEGER NOT NULL</text>
  <rect x="1040" y="196" width="320" height="28" class="normal-row"/>
  <text x="1050" y="215" class="text-black">space_type TEXT NOT NULL</text>
  <rect x="1040" y="224" width="320" height="28" class="normal-row"/>
  <text x="1050" y="243" class="text-black">space_status TEXT NOT NULL</text>

  <!-- MEETING_ROOMS -->
  <rect x="1040" y="360" width="320" height="32" class="table-header"/>
  <text x="1200" y="382" text-anchor="middle" class="text-white">meeting_rooms</text>
  <rect x="1040" y="392" width="320" height="28" class="fk-row"/>
  <text x="1050" y="411" class="text-black">* space_id TEXT (PK, FK -&gt; spaces)</text>
  <rect x="1040" y="420" width="320" height="28" class="normal-row"/>
  <text x="1050" y="439" class="text-black">room_number TEXT NOT NULL</text>
  <rect x="1040" y="448" width="320" height="28" class="normal-row"/>
  <text x="1050" y="467" class="text-black">floor INTEGER NOT NULL</text>
  <rect x="1040" y="476" width="320" height="28" class="normal-row"/>
  <text x="1050" y="495" class="text-black">equipment_list TEXT NOT NULL</text>
  <rect x="1040" y="504" width="320" height="28" class="normal-row"/>
  <text x="1050" y="523" class="text-black">num_power_outlets INTEGER NOT NULL</text>

  <!-- BOOKINGS -->
  <rect x="470" y="400" width="430" height="32" class="table-header"/>
  <text x="685" y="422" text-anchor="middle" class="text-white">bookings</text>
  <rect x="470" y="432" width="430" height="28" class="pk-row"/>
  <text x="480" y="451" class="text-black">* booking_id TEXT PRIMARY KEY</text>
  <rect x="470" y="460" width="430" height="28" class="fk-row"/>
  <text x="480" y="479" class="text-black">space_id TEXT (FK -&gt; spaces)</text>
  <rect x="470" y="488" width="430" height="28" class="fk-row"/>
  <text x="480" y="507" class="text-black">user_id TEXT (FK -&gt; users)</text>
  <rect x="470" y="516" width="430" height="28" class="normal-row"/>
  <text x="480" y="535" class="text-black">start_time TEXT NOT NULL</text>
  <rect x="470" y="544" width="430" height="28" class="normal-row"/>
  <text x="480" y="563" class="text-black">end_time TEXT NOT NULL</text>
  <rect x="470" y="572" width="430" height="28" class="normal-row"/>
  <text x="480" y="591" class="text-black">booking_status TEXT NOT NULL</text>

  <!-- RELACIONES -->
  <!-- users -> bookings -->
  <path d="M 195 252 Q 195 400 470 495" class="rel-line" marker-end="url(#arrow-end)"/>
  <text x="300" y="370" text-anchor="middle" class="rel-label">1:N</text>
  <!-- spaces -> bookings -->
  <path d="M 1100 252 Q 950 330 900 470" class="rel-line" marker-end="url(#arrow-end)"/>
  <text x="1010" y="340" text-anchor="middle" class="rel-label">1:N</text>
  <!-- spaces -> meeting_rooms -->
  <line x1="1200" y1="252" x2="1200" y2="390" class="rel-line" marker-end="url(#arrow-end)"/>
  <text x="1230" y="325" text-anchor="middle" class="rel-label">1:0..1</text>

  <!-- LEYENDA -->
  <rect x="40" y="660" width="1320" height="70" fill="#f0f0f0" stroke="#999" stroke-width="1" rx="5"/>
  <rect x="60" y="675" width="20" height="20" class="pk-row" stroke="#333" stroke-width="1"/>
  <text x="90" y="690" class="legend-label">* PK (identifica fila)</text>
  <rect x="60" y="700" width="20" height="20" class="fk-row" stroke="#333" stroke-width="1"/>
  <text x="90" y="715" class="legend-label">FK (vincula a otra tabla)</text>
  <text x="340" y="690" class="legend-label">1:N = Una a muchos (clave foránea directa)</text>
  <text x="340" y="715" class="legend-label">1:0..1 = Herencia por tabla unida (spaces ↔ meeting_rooms)</text>
  <text x="900" y="690" class="legend-label">4 tablas: users, spaces, meeting_rooms (extensión), bookings.</text>
  <text x="900" y="715" class="legend-label">spaces → meeting_rooms implementa herencia joined-table.</text>
</svg>
